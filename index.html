<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a6b3c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="掼蛋 - 完全离线的AI对战掼蛋游戏">
  <title>掼蛋 - AI对战</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <!-- PWA iOS 图标 -->
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <!-- 预加载脚本 -->
  <script src="js/cards.js"></script>
  <script src="js/rules.js"></script>
  <script src="js/settings.js"></script>
  <script src="js/memory.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/game.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

  <!-- Service Worker 注册：实现离线缓存 -->
  <script>
    if ('serviceWorker' in navigator) {
      // file:// 协议不支持 Service Worker，直接跳过
      if (location.protocol !== 'file:') {
        navigator.serviceWorker.register('sw.js')
          .then(function(reg) {
            console.log('[PWA] Service Worker 注册成功，作用域:', reg.scope);
          })
          .catch(function(err) {
            console.warn('[PWA] Service Worker 注册失败（离线不影响游戏运行）:', err);
          });
      } else {
        console.log('[PWA] 以 file:// 协议打开，Service Worker 不可用。游戏完全本地运行，无需网络。');
      }
    }

    // 离线运行时检测（仅作提示，不影响功能）
    (function() {
      if (location.protocol === 'file:' || !navigator.onLine) {
        console.log('[掼蛋] 离线模式 — 游戏完全本地运行，无需网络连接');
      }
    })();
  </script>
</head>
<body>
  <div id="app">
    <!-- 由 UI 渲染 -->
  </div>
</body>
</html>
